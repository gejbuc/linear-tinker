# .github/workflows/cron.yml
name: F1 Race Day Checker

on:
  schedule:
    # Runs at 06:00 UTC every day.
    # (Adjust the '6' if you want it earlier or later)
    - cron: '0 6 * * *'

  # This magic line allows you to trigger the script manually from GitHub!
  workflow_dispatch:

jobs:
  run-f1-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Notifier Script
        env:
          # Pulls your secret topic name from GitHub
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/notifier.py
