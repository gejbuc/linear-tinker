# .github/workflows/morning.yml
name: Morning Sports Checker

on:
  # Triggered externally by cron-job.org at 09:00 UTC (12:00 EAT) daily
  # Kept as fallback in case external trigger misses
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  morning-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Morning Check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          CRONJOB_TOKEN: ${{ secrets.CRONJOB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.MORNING_GH_PAT }}
          MODE: morning
        run: python scripts/notifier.py --mode morning
