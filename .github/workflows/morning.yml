# .github/workflows/morning.yml
name: Morning Sports Checker

on:
  schedule:
    # 06:00 UTC every day
    - cron: '0 6 * * *'
    # one-time test: 08:41 UTC on June 10 (11:41 EAT) — remove after
    - cron: '41 8 10 6 *'
  workflow_dispatch:

jobs:
  morning-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Morning Check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          MODE: morning
        run: python scripts/notifier.py --mode morning
