# .github/workflows/afternoon.yml
name: Afternoon Reminder

on:
  # Triggered exclusively by cron-job.org at 15:00 UTC (18:00 EAT) daily
  workflow_dispatch:

jobs:
  afternoon-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Afternoon Reminder
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          MODE: afternoon
        run: python scripts/notifier.py --mode afternoon
