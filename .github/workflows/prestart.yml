# .github/workflows/prestart.yml
name: Pre-Start Alert

on:
  schedule:
    # Every 5 minutes between 04:00 and 23:00 UTC (07:00–02:00 EAT)
    # Covers all F1 and World Cup kick-off windows for EAT timezone
    - cron: '*/5 4-23 * * *'
  workflow_dispatch:

jobs:
  prestart-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Pre-Start Check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          MODE: prestart
        run: python scripts/notifier.py --mode prestart
