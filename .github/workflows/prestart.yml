# .github/workflows/prestart.yml
name: Pre-Start Alert

on:
  schedule:
    # Every 5 minutes, all day — covers matches at any hour including
    # early morning UTC kickoffs (03:00-07:00 EAT) common in World Cup
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  prestart-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Pre-Start Check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          MODE: prestart
        run: python scripts/notifier.py --mode prestart
