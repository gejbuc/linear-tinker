# .github/workflows/prestart.yml
name: Pre-Start Alert

on:
  # Triggered exclusively by cron-job.org at the exact pre-start time
  # Jobs are created dynamically by the morning workflow — no polling
  workflow_dispatch:

jobs:
  prestart-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Pre-Start Check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          MODE: prestart
        run: python scripts/notifier.py --mode prestart
